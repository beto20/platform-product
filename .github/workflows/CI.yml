# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Analyze Static Code
      run: mvn compile pmd:pmd

    - name: Execute Unit Test
      run: mvn test

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: plataforma-latest.jar
        path: target/*.jar
        if-no-files-found: error
        retention-days: 1

  publish_image:
    needs: ["build"]
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download Jar
        uses: actions/download-artifact@v8
        with:
          name: plataforma-latest.jar
          path: target

      - name: Build docker image
        run: docker build -t albertovs/platform-product:v1.0.0 .

      - name: Docker hub login
        env:
          DOCKER_TOKEN: ${{ secrets.PAT_DOCKER_HUB }}
        run: echo "$DOCKER_TOKEN" | docker login --username albertovs --password-stdin

      - name: Push image
        run: docker push albertovs/platform-product:v1.0.0
